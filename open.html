<!DOCTYPE html>
	<head><title>
		emulator
	</title></head>


<body>

	<nav>
		<div class="rect1"></div>
		<div class="rect2"></div>
		<div class="rect3"></div>

		<div class="searchbox">
				<button class="dropbtn">...</button>
				<div class="dropdown-content">
					<button onclick="loadGame('PokemonRuby.gba')">Pokemon Ruby</button>
					<button onclick="loadGame('PokemonFireRed.gba')">Pokemon FireRed</button>
					<button onclick="loadGame('ZeldaMinishCap.gba')">The Legend of Zelda: Minish Cap</button>
					<button onclick="loadGame('KuruKuruKururin.gba')">Kurukuru Kururin</button>
					<button class="" onclick="loadGame('e.gba')">hofuia</button>
				</div>

		</div>

	</nav>

	<div class="bg"></div>

	<div id="emulator">
		<div style="width:1314px;height:475px;max-width:100%;">
				<div id="game"></div>
		</div>
		<script>
			EJS_player = "#game";
			EJS_core = "gba";
			EJS_gameName = "Pokemon Ruby";
			EJS_color = "#ff0000";
			EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
			EJS_gameUrl = ".gba/PokemonRuby.gba";
		</script>
		<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
	</div>


<script>
	window.addEventListener("keydown", function(e) {
			if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
					e.preventDefault();
			}
	}, false);


function loadGame(file) {
    document.getElementById("game").innerHTML = "";

    EJS_gameUrl = ".gba/" + file;

    if (window.EJS_emulator) {
        window.EJS_emulator.destroy();
    }

    var script = document.createElement("script");
    script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
    document.body.appendChild(script);
}
</script>

<style>
	@font-face {
	font-family: "tiny5";
	src: url("Tiny5-Regular.ttf") format("truetype");
	}

	#emulator {
		position:relative;
		margin-top: 140px;
		z-index:4;
	}

	body {
		margin: 0;
		background: #9d00ff;
		color: #eee;
		display: flex;
		flex-direction: column;
		align-items: center;
	}

	nav {
		justify-items: center;
		position: absolute;
		display: flexbox;
	}
	.rect1 { 
		position: absolute;
		width: 1366px;
		height:128px; 
		background: #9d00ff; 
		z-index: 1;
	}	
	.rect2 { 
		position: absolute;
		margin-top: 10px;
		border-radius: 10px;
		width: 1166px;
		height:108px; 
		background: #b236ff;
		z-index: 2; 
	}
	.rect3 {
		position: absolute;
		margin-top: 10px;
		border-radius: 10px;
		width: 966px;
		height: 108px;
		background: #c15eff;
		z-index: 3;
	}
	.bg {
		background: #111;
		position:absolute;
		width: 1336px;
		height: 500px;
		margin-top:128px;
		margin-bottom:30px;
		z-index:4;
		border-radius:15px;
	}
	.searchbox{
		background: #e4b9ff;
		border-radius: 15px;
		
		height: 68px;
		width: 766px;
		position: absolute;	
		margin-top: 30px;
		z-index: 5;
		transition: height 0.5s;
	}
	.dropbtn{
		width:766px;
		font-size:64px;
		font-family: "tiny5";
		border:none;
		background:none;
		visibility: visible;
	}

	.dropdown-content {
		display: none;
		position: absolute;
		background: none;
		color:#c15eff;
		max-width: 1100px;
		padding: 12px 16px;
		font-family: "tiny5";
		font-size: 32px;
	}

	.searchbox:focus-within {
		border: #9d00ff solid 4px;
		margin-top: 26px;
		height: 468px
	}
	.searchbox:focus-within .dropbtn{
		height: 468px;
		position:fixed;
		color:#e4b9ff;
		text-indent: -9999px;
	}
	.searchbox:focus-within .dropdown-content{
		display:block;
	}

</style>

</body>
